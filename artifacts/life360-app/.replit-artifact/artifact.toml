kind = "web"
previewPath = "/"
title = "Family Locator"
version = "1.0.0"
id = "artifacts/life360-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25491

[services.development]
run = "pnpm --filter @workspace/life360-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/life360-app", "run", "build" ]
publicDir = "artifacts/life360-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25491"
BASE_PATH = "/"
